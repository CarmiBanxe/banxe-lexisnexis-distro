name: CI — LexisNexis Distro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Scan — P0 Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks — detect secrets in history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint — lint all Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning
          ignore: DL3008,DL3009

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck -q
      - name: Lint shell scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" | while read f; do
            shellcheck -S warning "$f" && echo "✅ $f"
          done

  compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          # Check compose file is valid YAML
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))" \
            && echo "✅ docker-compose.yml is valid YAML"

      - name: Check no hardcoded secrets in compose
        run: |
          # Verify all sensitive values use ${VAR} syntax (not hardcoded)
          if grep -E '(password|api_key|secret|token)\s*:\s*[^$\{]' docker-compose.yml | grep -v '#'; then
            echo "❌ Potential hardcoded secret in docker-compose.yml" && exit 1
          fi
          echo "✅ No hardcoded secrets in docker-compose.yml"

      - name: Check .env.example has all required vars
        run: |
          if [ -f .env.example ]; then
            echo "✅ .env.example present"
            cat .env.example
          else
            echo "⚠️ .env.example missing"
          fi
